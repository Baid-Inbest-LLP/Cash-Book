# Render Blueprint — Cash Book (pnpm monorepo)
#
# Before deploy:
# 1. Set MONGODB_URI on cash-book-server (Render Dashboard → Environment).
# 2. In MongoDB Atlas → Network Access, allow 0.0.0.0/0 (or Render egress IPs).
# 3. After first deploy, set FRONTEND_URL on cash-book-server to your static site
#    URL if the name differs from below.

services:
  - type: web
    name: cash-book-server
    runtime: node
    plan: starter
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter server start
    healthCheckPath: /api/v1/health
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        value: https://cashbook-client-fcqj.onrender.com

  - type: web
    name: cash-book-client
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: pnpm --filter client build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cashbook-server-pu71.onrender.com/api/v1
