version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: cashbook-mongodb
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cashbook_db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cashbook-server
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/cashbook_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      CLIENT_URL: http://localhost:5174
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cashbook-client
    restart: unless-stopped
    ports:
      - '8081:80'
    depends_on:
      - server

volumes:
  mongodb_data:
