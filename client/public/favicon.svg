<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="cashbookBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d5fb3" />
      <stop offset="1" stop-color="#0b2f81" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#cashbookBg)" />
  <!-- Ledger book: white cover with a lighter spine -->
  <rect x="8.5" y="6.5" width="15" height="19" rx="2.5" fill="#ffffff" />
  <rect x="8.5" y="6.5" width="4" height="19" rx="2" fill="#bcd3ff" />
  <!-- Rupee mark on the cover -->
  <text x="17.2" y="20.8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-size="12.5" font-weight="700" fill="#0b2f81">₹</text>
</svg>
